<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        .checkout {
            width: 80%;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, .1);
        }
        
        .checkout h2 {
            margin-bottom: 30px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        textarea {
            resize: none;
        }
        
        .payment {
            margin: 25px 0;
            padding: 15px;
            background: #f8f8f8;
            border-radius: 10px;
        }
        
        .place-btn {
            width: 100%;
            padding: 15px;
            background: #0077ff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }
        
        .place-btn:hover {
            background: #0059c9;
        }
    </style>

</head>

<body>

    <header>

        <div class="logo">

            <i class="fa-solid fa-store"></i> ShopEase

        </div>

    </header>

    <div class="checkout">

        <h2>Checkout</h2>

        <form id="checkoutForm">

            <div class="form-group">

                <label>Full Name</label>

                <input type="text" id="name" required>

            </div>

            <div class="form-group">

                <label>Phone Number</label>

                <input type="tel" id="phone" required>

            </div>

            <div class="form-group">

                <label>Email</label>

                <input type="email" id="email" required>

            </div>

            <div class="form-group">

                <label>Delivery Address</label>

                <textarea id="address" rows="4" required></textarea>

            </div>

            <div class="form-group">

                <label>Pincode</label>

                <input type="text" id="pincode" required>

            </div>

            <div class="payment">

                <h3>Payment Method</h3>

                <label>

<input
type="radio"
checked>

Cash on Delivery

</label>

            </div>

            <button class="place-btn" type="submit">

Place Order

</button>

        </form>

    </div>

    <script>
        const form = document.getElementById("checkoutForm");

        form.addEventListener("submit", (e) => {

            e.preventDefault();

            const name = document.getElementById("name").value;

            const address = document.getElementById("address").value;

            const cart = JSON.parse(localStorage.getItem("cart")) || [];

            const items = cart.map(item => item.name).join(", ");

            alert(

                `🎉 Order Placed Successfully!

Customer: ${name}

Product(s):
${items}

Delivery Address:
${address}

Payment:
Cash on Delivery`

            );

            localStorage.removeItem("cart");

            window.location.href = "index.html";

        });
    </script>

</body>

</html>
